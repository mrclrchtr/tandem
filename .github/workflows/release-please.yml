# Runs on push to main. Release-please opens a PR with version bumps
# (Cargo.toml, plugin manifests, CHANGELOG). It does NOT regenerate
# Cargo.lock — so we add a post-hook to do that before CI sees the PR.
#
# Why not release-type: "rust"?
# The project uses [workspace.package] (not [package]) in the root
# Cargo.toml, which the Rust strategy's CargoToml updater rejects.
# The "simple" type + extra-files works, but Cargo.lock needs a
# manual `cargo update --workspace` — handled below.

name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Token with repo push access — needed so the lock file commit
      # triggers downstream CI (default GITHUB_TOKEN suppresses it).
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # Checked out so we can git fetch/checkout the release-please PR
      # branch and push to it. Must use the App token, not GITHUB_TOKEN.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      # Bumps versions, creates PR. Outputs:
      #   prs_created — "true" if a PR was created or updated
      #   pr          — JSON with headBranchName, number, title, …
      - name: Release PR + tag automation
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

      # Create a git tag if one is missing. With skip-github-release: true,
      # release-please bumps versions but never creates tags. The tag
      # triggers the cargo-dist Release workflow which builds artifacts,
      # creates the GitHub Release, and publishes to Homebrew.
      - name: Create release tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          TAG="v${VERSION}"
          git fetch --tags origin
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "${TAG}"
            git push origin "${TAG}"
            echo "Created and pushed tag ${TAG}"
          fi

      # Post-hook: after the version bump, regenerate Cargo.lock so
      # `cargo check --locked` in CI passes on the release PR.
      # Runs synchronously before the pull_request:opened event fires,
      # so CI sees the PR with Cargo.lock already in sync.
      - name: Update Cargo.lock on release PR
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          BRANCH=$(echo "$PR_JSON" | jq -r '.headBranchName')
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          rustup toolchain install --no-self-update
          cargo update --workspace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --exit-code Cargo.lock; then
            git add Cargo.lock
            git commit -m "chore: update Cargo.lock for version bump"
            git push origin "$BRANCH"
          fi
