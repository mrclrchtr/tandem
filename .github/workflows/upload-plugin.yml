name: upload-plugin

on:
  workflow_call:
    inputs:
      plan:
        description: dist release plan JSON
        required: false
        type: string

permissions:
  contents: write

jobs:
  upload-plugin:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Package plugin
        run: |
          set -euo pipefail
          archive="tndm-plugin-${GITHUB_REF_NAME}.tar.gz"

          mkdir -p out
          rm -rf out/tndm-plugin
          mkdir -p out/tndm-plugin
          cp -R plugins/tndm out/tndm-plugin/

          tar -czf "out/${archive}" -C out tndm-plugin
          echo "PLUGIN_ARCHIVE=${archive}" >> "$GITHUB_ENV"
      - name: Upload plugin archive to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" "out/${PLUGIN_ARCHIVE}" --clobber
