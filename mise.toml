[settings]
experimental = true
lockfile = true
disable_tools = ["rust"]

[env]
_.path = [
  "{{env.HOME}}/.cargo/bin",
  "{{config_root}}/node_modules/.bin",
]

[tools]
actionlint = "1.7.12"
hk = "1.45.0"
node = "24.15.0"
pkl = "latest"
pnpm = "10.33.2"

[tasks.hooks-install]
description = "Install git hooks (mise wrapper)"
run = "hk install --mise"

[tasks.fmt]
description = "Check formatting"
run = "hk run check --all --check --step cargo-fmt"

[tasks.fmt-fix]
description = "Apply formatting"
run = "hk run fix --all --fix"

[tasks.clippy]
description = "Run clippy"
run = "hk run check --all --check --step cargo-clippy"

[tasks.compile]
description = "Run cargo check"
run = "hk run check --all --check --step cargo-check"

[tasks.arch]
description = "Validate workspace architecture boundaries"
run = "cargo xtask check-arch"

[tasks.sync-version]
description = "Sync plugin/marketplace versions from Cargo.toml"
run = "cargo xtask sync-version"

[tasks.sync-version-check]
description = "Check plugin/marketplace versions match Cargo.toml"
run = "cargo xtask sync-version --check"

[tasks.bump]
description = "Bump workspace version and sync derived files"
usage = '''
arg "<version>" help="New version number (e.g. 0.4.0)"
'''
run = """
version="${usage_version:?}"
sed -i '' -e 's|^version = ".*"|version = "'"${version}"'"|' Cargo.toml
mise run sync-version
"""

[tasks.test]
description = "Run tests"
run = "cargo test --workspace --locked"

[tasks.check]
description = "Run all checks"
depends = ["fmt", "compile", "arch", "clippy", "test", "sync-version-check"]

[tasks.fix]
description = "Run all auto-fixes"
depends = ["fmt-fix"]
